# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "niram-css"
version = "0.2.0"
entrypoint = "src/lib.typ"
authors = ["nandac"]
license = "Unlicense"
description = "Use all 147 standard CSS and SVG named colors directly in your Typst documents without looking up hex codes."
# homepage = ""
repository = "https://github.com/nandac/niram-css"
keywords = ["color", "css", "palette", "web", "svg"]
categories = ["components"]
disciplines = ["design", "drawing"]
compiler = "0.13.0"
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".gitignore",
  ".typstignore",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
  "thumbnail-2-dark.svg",
  "thumbnail-2-light.svg",
]
